name = "kartelboats-form"
main = "worker.js"
compatibility_date = "2024-01-01"

# Environment variables set via Cloudflare dashboard (Secrets):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#
# Deploy:
#   npm install -g wrangler
#   wrangler login
#   wrangler deploy
#
# Then set secrets:
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
